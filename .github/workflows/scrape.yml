name: Scrape Internships

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:       # allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python runner.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}

      - name: Commit DB if changed
        run: |
          git config user.name  "internship-bot"
          git config user.email "bot@noreply"
          git add data/seen_jobs.db
          git diff --cached --quiet && exit 0
          git commit -m "chore: update job state [skip ci]"
          # digest.yml also commits to data/seen_jobs.db and can run in the
          # same minute (both fire at :00 once a day), so retry with a
          # rebase instead of letting a losing push silently drop the commit.
          for i in 1 2 3 4 5; do
            git push && exit 0
            git fetch origin main
            git rebase origin/main
          done
          echo "::error::failed to push job state after 5 attempts"
          exit 1
