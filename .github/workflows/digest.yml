name: Send Nightly Digest

on:
  schedule:
    # 01:10 UTC, offset 10min from scrape.yml's hourly :00 trigger so the
    # two workflows don't race to commit data/seen_jobs.db at 01:00 UTC.
    - cron: '10 1 * * *'   # 01:10 UTC = ~9:10pm ET
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send digest
        run: python digest.py
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Commit cleared queue
        run: |
          git config user.name  "internship-bot"
          git config user.email "bot@noreply"
          git add data/seen_jobs.db
          git diff --cached --quiet && exit 0
          git commit -m "chore: clear digest queue [skip ci]"
          for i in 1 2 3 4 5; do
            git push && exit 0
            git fetch origin main
            git rebase origin/main
          done
          echo "::error::failed to push cleared queue after 5 attempts"
          exit 1
