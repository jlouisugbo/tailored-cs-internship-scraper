keywords:
  - intern
  - internship
  - co-op
  - coop
  - student developer
  - apprentice
  - scholar
  - university hire
  - placement

notification:
  discord_webhook_env: DISCORD_WEBHOOK_URL
  email_to: you@example.com
  email_from_env: GMAIL_ADDRESS
  email_password_env: GMAIL_APP_PASSWORD
  digest_hour_utc: 1
  # Discord user ID to @mention when a job in discord_ping_categories comes in.
  # Right-click your name in Discord (Developer Mode on) -> Copy User ID.
  # Leave blank to disable pings entirely.
  discord_ping_user_id: ""
  # Which company categories should trigger a ping (in addition to the normal
  # embed, which always posts regardless of this setting). Empty = never ping.
  discord_ping_categories: [1]

github_repos:
  - repo: vanshb03/Summer2027-Internships
    branch: dev
    path: README.md
    priority: primary
  - repo: SimplifyJobs/Summer2027-Internships
    branch: dev
    path: README.md
    priority: secondary

